<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemistry Lab 🧪 (Final)</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ffecd2,#fcb69f);
}

.card{
position:absolute;
background:rgba(255,255,255,0.3);
padding:15px;
border-radius:20px;
z-index:9999;
}

#hud{top:10px;left:10px;width:260px;}
#eduPanel{bottom:10px;left:10px;width:280px;}

#label{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:#ff9a9e;
padding:10px 20px;
border-radius:30px;
display:none;
font-weight:bold;
z-index:9999;
}

button,select{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:10px;
}
</style>

<script>

let tubeAElement, tubeBElement
let reactionStarted=false
let interval=null

let liquidLevelA=0.45
let liquidLevelB=0.45

let viscosity="thin"
let chemicalA="acid"
let chemicalB="base"

// 🧪 REAL CHEMICAL COLORS
const chemicals={
acid:{color:"#4da6ff",name:"HCl"},
base:{color:"#ffe066",name:"NaOH"},
potassium:{color:"#a64dff",name:"Potassium"},
copper:{color:"#3399ff",name:"CuSO₄"}
}

document.addEventListener("DOMContentLoaded",()=>{
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")

updateInitialColors()

// dropdown fix
document.querySelectorAll("select").forEach(sel=>{
sel.addEventListener("change",()=>{
viscosity=document.getElementById("viscosity").value
chemicalA=document.getElementById("chemA").value
chemicalB=document.getElementById("chemB").value
updateInitialColors()
resetExperiment()
})
})
})

// 🎯 DETECTION
AFRAME.registerComponent("pour-system",{
tick:function(){

const A=document.querySelector("#markerA")
const B=document.querySelector("#markerB")

if(!A.object3D.visible || !B.object3D.visible) return

const tilt=Math.abs(A.object3D.rotation.x*(180/Math.PI))
tubeAElement.setAttribute("rotation",`-${tilt} 0 0`)

const posA=A.object3D.getWorldPosition(new THREE.Vector3())
const posB=B.object3D.getWorldPosition(new THREE.Vector3())

const dist=posA.distanceTo(posB)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

if(dist<1.8 && tilt>30 && tipA.y>topB.y && !reactionStarted){

reactionStarted=true
document.getElementById("label").style.display="block"
document.getElementById("label").innerText="🧪 Mixing Started!"

startPouring()
}
}
})

// 🚀 POUR
function startPouring(){

let count=0

interval=setInterval(()=>{

if(count>=40){
clearInterval(interval)
applyFinalColor()
createHeat()
document.getElementById("label").innerText="🎉 Reaction Complete!"
return
}

// liquid levels
liquidLevelA-=0.01
liquidLevelB+=0.01
updateLiquidLevels()

createFluidStream()
createSwirl()

count++

}, viscosity==="thick"?180:100)
}

// 💧 FLUID
function createFluidStream(){

const posA=new THREE.Vector3()
const posB=new THREE.Vector3()

tubeAElement.object3D.getWorldPosition(posA)
tubeBElement.object3D.getWorldPosition(posB)

let drops = viscosity==="thick"?2:6
let size = viscosity==="thick"?0.025:0.015
let speed = viscosity==="thick"?900:600

for(let i=0;i<drops;i++){

const d=document.createElement("a-sphere")
d.setAttribute("class","fluid")
d.setAttribute("radius",size)
d.setAttribute("color",chemicals[chemicalA].color)

d.setAttribute("position",{
x:posA.x+(Math.random()-0.5)*0.05,
y:posA.y+0.2,
z:posA.z+(Math.random()-0.5)*0.05
})

d.setAttribute("animation__fall",{
property:"position",
to:`${posB.x} ${posB.y+0.3} ${posB.z}`,
dur:speed
})

document.querySelector("a-scene").appendChild(d)
setTimeout(()=>d.remove(),speed)
}
}

// 🌀 SWIRL
function createSwirl(){

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

const p=document.createElement("a-sphere")
p.setAttribute("class","swirl")
p.setAttribute("radius","0.015")
p.setAttribute("color",chemicals[chemicalB].color)

p.setAttribute("position",{x:pos.x,y:pos.y+0.2,z:pos.z})

p.setAttribute("animation",{
property:"position",
to:`${pos.x+0.3} ${pos.y+0.5} ${pos.z}`,
dur:1000,
dir:"alternate",
loop:true
})

document.querySelector("a-scene").appendChild(p)
setTimeout(()=>p.remove(),1000)
}

// 🔥 HEAT
function createHeat(){

if(chemicalA==="potassium"){

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

const heat=document.createElement("a-sphere")
heat.setAttribute("radius","0.4")
heat.setAttribute("color","#ff3300")
heat.setAttribute("opacity","0.4")

heat.setAttribute("position",{x:pos.x,y:pos.y+0.4,z:pos.z})

heat.setAttribute("animation__pulse",{
property:"scale",
to:"1.5 1.5 1.5",
dir:"alternate",
loop:true,
dur:500
})

document.querySelector("a-scene").appendChild(heat)
}
}

// 💧 LEVEL
function updateLiquidLevels(){

document.querySelector("#liquidA").setAttribute("height",liquidLevelA)
document.querySelector("#liquidA").setAttribute("position",`0 ${0.15 + liquidLevelA/2} 0`)

document.querySelector("#liquidB").setAttribute("height",liquidLevelB)
document.querySelector("#liquidB").setAttribute("position",`0 ${0.15 + liquidLevelB/2} 0`)
}

// 🎨 INITIAL COLORS
function updateInitialColors(){
document.querySelector("#liquidA").setAttribute("color",chemicals[chemicalA].color)
document.querySelector("#liquidB").setAttribute("color",chemicals[chemicalB].color)
}

// 🎯 FINAL COLOR LOGIC
function applyFinalColor(){

let finalColor

if(chemicalA==="acid" && chemicalB==="base"){
finalColor="#00cc66" // green
}
else if(chemicalA==="potassium"){
finalColor="#ff3300" // heat
}
else if(chemicalA==="copper" || chemicalB==="copper"){
finalColor="#3399ff" // no change
}
else{
finalColor=chemicals[chemicalB].color
}

document.querySelector("#liquidA").setAttribute("color",finalColor)
document.querySelector("#liquidB").setAttribute("color",finalColor)
}

// 🔄 RESET
function resetExperiment(){

reactionStarted=false
clearInterval(interval)

liquidLevelA=0.45
liquidLevelB=0.45

updateLiquidLevels()

document.querySelectorAll(".fluid,.swirl").forEach(e=>e.remove())

updateInitialColors()

document.getElementById("label").style.display="none"
}

</script>
</head>

<body>

<div id="hud" class="card">
<h3>🧪 Smart Chemistry Lab</h3>

<select id="viscosity">
<option value="thin">Thin Liquid</option>
<option value="thick">Thick Liquid</option>
</select>

<select id="chemA">
<option value="acid">HCl (Acid)</option>
<option value="potassium">Potassium</option>
<option value="copper">CuSO₄</option>
</select>

<select id="chemB">
<option value="base">NaOH (Base)</option>
<option value="copper">CuSO₄</option>
</select>

<button onclick="resetExperiment()">Reset</button>
</div>

<div id="label">Reaction</div>

<div id="eduPanel" class="card">
<p>💧 Viscosity affects flow</p>
<p>🔥 Heat for potassium</p>
<p>🎨 Real chemical colors</p>
</div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system style="pointer-events:none;">

<a-light type="ambient" intensity="1"></a-light>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#fff" opacity="0.4"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0"></a-cylinder>
</a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#fff" opacity="0.4"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0"></a-cylinder>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
