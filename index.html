<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Advanced</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
}

#eduPanel{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
width:250px;
}

button, select{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:5px;
}

.angle-display{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
background:rgba(0,0,0,0.7);
padding:10px 40px;
border-radius:50px;
display:none;
}
</style>

<script>

let tubeAElement=null
let tubeBElement=null

let liquidLevelA=0.45
let liquidLevelB=0.45

let tiltAngle=0
let pouredAmount=0
let reactionStarted=false

let currentExperiment="neutralization"
let isPaused=false
let pourInterval=null

const BLUE='#0066cc'
const YELLOW='#ffaa00'
const GREEN='#00cc66'

const REQUIRED_TILT=40
const REQUIRED_DISTANCE=1.5

document.addEventListener("DOMContentLoaded",function(){
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")
mixLiquids(0)
})

AFRAME.registerComponent("pour-system",{
tick:function(){

const markerA=document.querySelector("#markerA")
const markerB=document.querySelector("#markerB")

if(!markerA.object3D.visible || !markerB.object3D.visible){
document.getElementById("status").innerText="Show both markers"
return
}

const rotX=markerA.object3D.rotation.x*(180/Math.PI)
tiltAngle=Math.abs(rotX)

tubeAElement.setAttribute("rotation",`-${tiltAngle} 0 0`)

if(tiltAngle>10){
document.querySelector(".angle-display").style.display="block"
document.querySelector(".angle-display").innerText=Math.round(tiltAngle)+"°"
}else{
document.querySelector(".angle-display").style.display="none"
}

const posA=markerA.object3D.getWorldPosition(new THREE.Vector3())
const posB=markerB.object3D.getWorldPosition(new THREE.Vector3())

const distance=posA.distanceTo(posB)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

const verticalCheck=tipA.y>topB.y

if(distance<REQUIRED_DISTANCE && tiltAngle>REQUIRED_TILT && verticalCheck && !reactionStarted){
reactionStarted=true
document.getElementById("status").innerText="Pouring..."
startPouring()
}

}
})

function startPouring(){

let count=0
const totalSteps=40

document.getElementById("pourSound").play()

pourInterval=setInterval(()=>{

if(isPaused) return

if(count>=totalSteps){
clearInterval(pourInterval)
document.getElementById("reactionSound").play()
document.getElementById("status").innerText="Reaction Complete!"
return
}

liquidLevelA=Math.max(0.1,liquidLevelA-0.01)
liquidLevelB=Math.min(0.6,liquidLevelB+0.01)

pouredAmount+=0.01

updateLiquidLevels()
createStream()
createParticles()

mixLiquids(Math.min(1,pouredAmount/0.35))

count++

},50)

}

function createStream(){

const stream=document.createElement("a-cylinder")

stream.setAttribute("radius","0.02")
stream.setAttribute("color","#00ccff")

const posA=tubeAElement.object3D.position
const posB=tubeBElement.object3D.position

stream.setAttribute("position",{
x:(posA.x+posB.x)/2,
y:(posA.y+posB.y)/2,
z:(posA.z+posB.z)/2
})

stream.setAttribute("height","0.8")

document.querySelector("a-scene").appendChild(stream)

setTimeout(()=>stream.remove(),100)

}

function createParticles(){

const particle=document.createElement("a-sphere")

particle.setAttribute("radius","0.03")

if(currentExperiment==="precipitation"){
particle.setAttribute("color","#ffffff")
}else{
particle.setAttribute("color","#00ffcc")
}

const pos=tubeBElement.object3D.position

particle.setAttribute("position",{
x:pos.x+(Math.random()-0.5)*0.2,
y:pos.y+0.3,
z:pos.z+(Math.random()-0.5)*0.2
})

particle.setAttribute("animation",{
property:"position",
to:`${pos.x} ${pos.y+0.6} ${pos.z}`,
dur:800
})

document.querySelector("a-scene").appendChild(particle)

setTimeout(()=>particle.remove(),800)

}

function updateLiquidLevels(){

document.querySelector("#liquidA").setAttribute("height",liquidLevelA)
document.querySelector("#liquidA").setAttribute("position",`0 ${0.15+liquidLevelA/2} 0`)

document.querySelector("#liquidB").setAttribute("height",liquidLevelB)
document.querySelector("#liquidB").setAttribute("position",`0 ${0.15+liquidLevelB/2} 0`)
}

function mixLiquids(amount){

if(currentExperiment==="neutralization"){

if(amount<=0){
setColor(BLUE,YELLOW)
}
else if(amount>=1){
setColor(GREEN,GREEN)
}
else{
blendColor(amount)
}

}
else if(currentExperiment==="precipitation"){
if(amount>=0.5){
setColor("#ffffff","#ffffff")
}
}
}

function setColor(a,b){
document.querySelector("#liquidA").setAttribute("color",a)
document.querySelector("#liquidB").setAttribute("color",b)
}

function blendColor(amount){
const r=Math.round(200*amount)
const g=Math.round(100+155*amount)
const b=Math.round(100+100*amount)
const color=`rgb(${r},${g},${b})`
setColor(color,color)
}

function changeExperiment(type){

currentExperiment=type
resetExperiment()

if(type==="neutralization"){
document.getElementById("reactionName").innerText="Neutralization"
document.getElementById("reactionEquation").innerText="HCl + NaOH → NaCl + H₂O"
document.getElementById("reactionDesc").innerText="Acid + Base → Salt + Water"
}
else{
document.getElementById("reactionName").innerText="Precipitation"
document.getElementById("reactionEquation").innerText="AgNO₃ + NaCl → AgCl ↓"
document.getElementById("reactionDesc").innerText="Solid forms from solution"
}
}

function togglePause(){
isPaused=!isPaused
}

function resetExperiment(){

liquidLevelA=0.45
liquidLevelB=0.45
pouredAmount=0
reactionStarted=false

if(pourInterval){
clearInterval(pourInterval)
}

updateLiquidLevels()
mixLiquids(0)

document.getElementById("status").innerText="Scan markers"
}

</script>
</head>

<body>

<div id="hud">
<h3>AR Chemical Mixing</h3>
<p id="status">Scan both markers</p>

<select onchange="changeExperiment(this.value)">
<option value="neutralization">Neutralization</option>
<option value="precipitation">Precipitation</option>
</select>

<button onclick="togglePause()">Pause/Resume</button>
<button onclick="resetExperiment()">Reset</button>
</div>

<div id="eduPanel">
<h3>Experiment Info</h3>
<p id="reactionName">Neutralization</p>
<p id="reactionEquation">HCl + NaOH → NaCl + H₂O</p>
<p id="reactionDesc">Acid reacts with base</p>
</div>

<div class="angle-display">0°</div>

<audio id="pourSound" src="pour.mp3"></audio>
<audio id="reactionSound" src="reaction.mp3"></audio>

<a-scene embedded arjs="debugUIEnabled:false" pour-system>

<a-light type="ambient" intensity="0.8"></a-light>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc"></a-cylinder>
</a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00"></a-cylinder>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
