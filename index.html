<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Stable Tracking</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<!-- Use 8th Wall for better tracking (optional - needs key) OR use location-based -->

<style>
body{margin:0;overflow:hidden;font-family:Arial;}
#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
}
button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin:5px;
font-weight:bold;
}
.controls{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:1000;
}
.angle-display{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:72px;
font-weight:bold;
color:white;
text-shadow:0 0 20px rgba(0,255,0,0.5);
z-index:1000;
}
</style>

<script>
// Simple solution: Use screen dragging instead of marker movement
let tubeAVisible=true; // Always visible
let tubeBVisible=true;
let isDragging=false;
let reactionStarted=false;
let tubeAElement=null;
let tubeBElement=null;

let dragStartY=0;
let tubeStartRot={x:0,y:0,z:0};

const BLUE_COLOR='#0066cc';
const YELLOW_COLOR='#ffaa00';
const GREEN_COLOR='#00cc66';

let liquidLevelA=0.45;
let liquidLevelB=0.45;
let tiltAngle=0;
let pouredAmount=0;
const TRIGGER_ANGLE=45;
let hasTriggered=false;

document.addEventListener('DOMContentLoaded',function(){
const scene=document.querySelector('a-scene');

// Create tubes at fixed positions (no markers needed)
setTimeout(() => {
tubeAElement=document.querySelector('#tubeA');
tubeBElement=document.querySelector('#tubeB');
tubeAElement.object3D.position.set(-1,0,0);
tubeBElement.object3D.position.set(1,0,0);
document.getElementById('status').textContent="✅ READY! Drag UP on BLUE tube to pour";
}, 1000);

// MOUSE DRAG for tilting
scene.addEventListener('mousedown',function(e){
if(reactionStarted) return;
e.preventDefault();
dragStartY=e.clientY;
const rot=tubeAElement.object3D.rotation;
tubeStartRot={x:rot.x, y:rot.y, z:rot.z};
isDragging=true;
});

scene.addEventListener('mousemove',function(e){
if(!isDragging || reactionStarted) return;
e.preventDefault();

const deltaY = e.clientY - dragStartY;
if(deltaY < -10) { // Dragging UP
    tiltAngle = Math.min(90, Math.abs(deltaY) * 0.3);
    tubeAElement.setAttribute('rotation', `-${tiltAngle} 0 0`);
    
    document.querySelector('.angle-display').innerHTML = `${Math.round(tiltAngle)}°`;
    
    if(tiltAngle >= TRIGGER_ANGLE && !hasTriggered) {
        startReaction();
    }
} else {
    tubeAElement.setAttribute('rotation', `0 0 0`);
    tiltAngle=0;
    document.querySelector('.angle-display').innerHTML = '0°';
}
});

scene.addEventListener('mouseup',function(){
isDragging=false;
});

// TOUCH DRAG for mobile
scene.addEventListener('touchstart',function(e){
if(reactionStarted) return;
e.preventDefault();
const touch=e.touches[0];
dragStartY=touch.clientY;
isDragging=true;
});

scene.addEventListener('touchmove',function(e){
if(!isDragging || reactionStarted) return;
e.preventDefault();
const touch=e.touches[0];

const deltaY = touch.clientY - dragStartY;
if(deltaY < -10) {
    tiltAngle = Math.min(90, Math.abs(deltaY) * 0.3);
    tubeAElement.setAttribute('rotation', `-${tiltAngle} 0 0`);
    
    document.querySelector('.angle-display').innerHTML = `${Math.round(tiltAngle)}°`;
    
    if(tiltAngle >= TRIGGER_ANGLE && !hasTriggered) {
        startReaction();
    }
} else {
    tubeAElement.setAttribute('rotation', `0 0 0`);
    tiltAngle=0;
    document.querySelector('.angle-display').innerHTML = '0°';
}
});

scene.addEventListener('touchend',function(){
isDragging=false;
});
});

function startReaction() {
    hasTriggered=true;
    reactionStarted=true;
    document.getElementById('status').textContent = "⚡ REACTION STARTED! ⚡";
    startPouring();
}

function startPouring() {
    let count=0;
    const interval=setInterval(() => {
        if(count>=35) {
            clearInterval(interval);
            completeReaction();
            return;
        }
        liquidLevelA = Math.max(0.1, liquidLevelA - 0.01);
        liquidLevelB = Math.min(0.6, liquidLevelB + 0.01);
        pouredAmount += 0.01;
        updateLiquidLevels();
        createDroplet();
        
        // Mix colors
        const mix = pouredAmount / 0.35;
        if(mix>0) mixLiquids(Math.min(1,mix));
        
        count++;
    }, 50);
}

function createDroplet() {
    if(!tubeAElement || !tubeBElement) return;
    const drop=document.createElement('a-sphere');
    drop.setAttribute('radius','0.015');
    drop.setAttribute('color',BLUE_COLOR);
    drop.setAttribute('position',{
        x: tubeAElement.object3D.position.x,
        y: tubeAElement.object3D.position.y + 0.3,
        z: tubeAElement.object3D.position.z
    });
    drop.setAttribute('animation',{
        property:'position',
        to:`${tubeBElement.object3D.position.x} ${tubeBElement.object3D.position.y+0.4} ${tubeBElement.object3D.position.z}`,
        dur:500
    });
    drop.setAttribute('animation__opacity',{
        property:'opacity',
        to:'0',
        dur:500
    });
    document.querySelector('a-scene').appendChild(drop);
    setTimeout(()=>drop.remove(),500);
}

function updateLiquidLevels() {
    const liquidA=document.querySelector('#liquidA');
    const liquidB=document.querySelector('#liquidB');
    if(liquidA) {
        liquidA.setAttribute('height', liquidLevelA);
        liquidA.setAttribute('position', `0 ${0.15+liquidLevelA/2} 0`);
    }
    if(liquidB) {
        liquidB.setAttribute('height', liquidLevelB);
        liquidB.setAttribute('position', `0 ${0.15+liquidLevelB/2} 0`);
    }
}

function mixLiquids(amount) {
    const mixedColor=`rgb(${Math.round(0+200*amount)}, ${Math.round(100+155*amount)}, ${Math.round(100+100*amount)})`;
    document.querySelector('#liquidA')?.setAttribute('color',mixedColor);
    document.querySelector('#liquidB')?.setAttribute('color',mixedColor);
}

function completeReaction() {
    document.getElementById('status').textContent = "🧪 REACTION COMPLETE!";
    document.querySelector('.angle-display').innerHTML = "✅";
}

function resetExperiment() {
    reactionStarted=false;
    hasTriggered=false;
    tiltAngle=0;
    pouredAmount=0;
    liquidLevelA=0.45;
    liquidLevelB=0.45;
    updateLiquidLevels();
    mixLiquids(0);
    document.getElementById('status').textContent = "READY! Drag UP on BLUE tube";
    document.querySelector('.angle-display').innerHTML = '0°';
    if(tubeAElement) tubeAElement.setAttribute('rotation','0 0 0');
}
</script>
</head>

<body>

<div id="hud">
<h2>🧪 Simple AR Pouring</h2>
<div id="status">Loading...</div>
<button onclick="resetExperiment()">🔄 Reset</button>
</div>

<div class="angle-display">0°</div>

<div class="controls">
<button style="background:#0066cc;" onclick="if(!reactionStarted)document.querySelector('#tubeA').setAttribute('rotation','-45 0 0');startReaction()">
    💧 TEST POUR
</button>
</div>

<a-scene embedded>

<a-light type="ambient" intensity="0.8"></a-light>
<a-light type="directional" position="1 2 1" intensity="0.6"></a-light>

<!-- Blue tube (fixed position) -->
<a-entity id="tubeA" position="-1 0 -2">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.6" transparent="true"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc" opacity="0.95"></a-cylinder>
<a-circle radius="0.13" position="0 0.45 0" color="#0066cc" rotation="-90 0 0"></a-circle>
<a-text value="BLUE" position="0 0.7 0" color="#0066cc"></a-text>
</a-entity>

<!-- Yellow tube (fixed position) -->
<a-entity id="tubeB" position="1 0 -2">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.6" transparent="true"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00" opacity="0.95"></a-cylinder>
<a-circle radius="0.13" position="0 0.45 0" color="#ffaa00" rotation="-90 0 0"></a-circle>
<a-text value="YELLOW" position="0 0.7 0" color="#ffaa00"></a-text>
</a-entity>

<a-entity camera position="0 1.6 0"></a-entity>

</a-scene>

</body>
