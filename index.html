<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemistry Lab 🧪</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ffecd2,#fcb69f);
}

.card{
position:absolute;
background:rgba(255,255,255,0.3);
padding:15px;
border-radius:20px;
z-index:9999;
}

#hud{top:15px;left:15px;width:240px;}
#eduPanel{bottom:15px;left:15px;width:260px;}

#label{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:#ff9a9e;
padding:10px 20px;
border-radius:30px;
display:none;
font-weight:bold;
z-index:9999;
}

button,select{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
}
</style>

<script>

let tubeAElement, tubeBElement
let reactionStarted=false
let currentExperiment="neutralization"
let interval=null

let liquidLevelA = 0.45
let liquidLevelB = 0.45

document.addEventListener("DOMContentLoaded",()=>{
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")

document.getElementById("experimentSelect").addEventListener("change",(e)=>{
currentExperiment=e.target.value
resetExperiment()
})
})

AFRAME.registerComponent("pour-system",{
tick:function(){

const A=document.querySelector("#markerA")
const B=document.querySelector("#markerB")

if(!A.object3D.visible || !B.object3D.visible) return

const tilt=Math.abs(A.object3D.rotation.x*(180/Math.PI))
tubeAElement.setAttribute("rotation",`-${tilt} 0 0`)

const posA=A.object3D.getWorldPosition(new THREE.Vector3())
const posB=B.object3D.getWorldPosition(new THREE.Vector3())

const dist=posA.distanceTo(posB)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

// trigger
if(dist<1.8 && tilt>30 && tipA.y>topB.y && !reactionStarted){

reactionStarted=true

document.getElementById("label").style.display="block"
document.getElementById("label").innerText="🧪 Mixing Started!"

startPouring()
}
}
})

// POUR
function startPouring(){

let count=0

interval=setInterval(()=>{

if(count>=40){
clearInterval(interval)
removeStream()
applyFinalColor()

document.getElementById("label").innerText="🎉 Reaction Complete!"
return
}

// liquid movement
liquidLevelA = Math.max(0.1, liquidLevelA - 0.01)
liquidLevelB = Math.min(0.6, liquidLevelB + 0.01)

updateLiquidLevels()

createStream()
createSwirl()

if(currentExperiment==="neutralization") createBubbles()
if(currentExperiment==="precipitation") createFoam()
if(currentExperiment==="exothermic") createSmoke()

count++

},100)
}

// STREAM
function createStream(){

const posA=new THREE.Vector3()
const posB=new THREE.Vector3()

tubeAElement.object3D.getWorldPosition(posA)
tubeBElement.object3D.getWorldPosition(posB)

let s=document.querySelector("#stream")

if(!s){
s=document.createElement("a-cylinder")
s.setAttribute("id","stream")
s.setAttribute("radius","0.02")
s.setAttribute("color","#00ccff")
document.querySelector("a-scene").appendChild(s)
}

const midX=(posA.x+posB.x)/2
const midY=(posA.y+posB.y)/2
const midZ=(posA.z+posB.z)/2

const dist=posA.distanceTo(posB)

s.setAttribute("position",{x:midX,y:midY,z:midZ})
s.setAttribute("height",dist)
s.object3D.lookAt(posB)
}

function removeStream(){
const s=document.querySelector("#stream")
if(s) s.remove()
}

// SWIRL EFFECT
function createSwirl(){

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

const p=document.createElement("a-sphere")
p.setAttribute("class","swirl")
p.setAttribute("radius","0.015")
p.setAttribute("color","#00ffff")
p.setAttribute("opacity","0.7")

p.setAttribute("position",{x:pos.x,y:pos.y+0.2,z:pos.z})

p.setAttribute("animation__circle",{
property:"position",
to:`${pos.x+0.2} ${pos.y+0.4} ${pos.z}`,
dur:1000,
dir:"alternate",
loop:true
})

document.querySelector("a-scene").appendChild(p)

setTimeout(()=>p.remove(),1200)
}

// LIQUID LEVEL
function updateLiquidLevels(){

const liquidA=document.querySelector("#liquidA")
const liquidB=document.querySelector("#liquidB")

liquidA.setAttribute("height",liquidLevelA)
liquidA.setAttribute("position",`0 ${0.15 + liquidLevelA/2} 0`)

liquidB.setAttribute("height",liquidLevelB)
liquidB.setAttribute("position",`0 ${0.15 + liquidLevelB/2} 0`)
}

// FINAL COLOR
function applyFinalColor(){

let color="#00cc66"
if(currentExperiment==="precipitation") color="#ffffff"
if(currentExperiment==="exothermic") color="#ff3300"

document.querySelector("#liquidA").setAttribute("color",color)
document.querySelector("#liquidB").setAttribute("color",color)
}

// EFFECTS
function createBubbles(){spawnEffect("#aeefff",0.02)}
function createFoam(){spawnEffect("#ffffff",0.03)}
function createSmoke(){spawnEffect("#888",0.08)}

function spawnEffect(color,size){

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

const e=document.createElement("a-sphere")
e.setAttribute("class","effect")
e.setAttribute("radius",size)
e.setAttribute("color",color)

e.setAttribute("position",{x:pos.x,y:pos.y+0.3,z:pos.z})

document.querySelector("a-scene").appendChild(e)
setTimeout(()=>e.remove(),1000)
}

// RESET
function resetExperiment(){

reactionStarted=false
clearInterval(interval)

liquidLevelA = 0.45
liquidLevelB = 0.45

updateLiquidLevels()

removeStream()

// remove particles
document.querySelectorAll(".effect, .swirl").forEach(e=>e.remove())

// reset color
document.querySelector("#liquidA").setAttribute("color","#0066cc")
document.querySelector("#liquidB").setAttribute("color","#ffaa00")

document.getElementById("label").style.display="none"
}

</script>
</head>

<body>

<div id="hud" class="card">
<h3>🧑‍🔬 Chemistry Lab</h3>

<select id="experimentSelect">
<option value="neutralization">🟢 Neutralization</option>
<option value="precipitation">⚪ Precipitation</option>
<option value="exothermic">🔴 Exothermic</option>
</select>

<button onclick="resetExperiment()">Reset</button>
</div>

<div id="label">Reaction</div>

<div id="eduPanel" class="card">
<h3>🧪 Result</h3>
<p>🟢 Green</p>
<p>⚪ White</p>
<p>🔴 Red</p>
</div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system style="pointer-events:none;">

<a-light type="ambient" intensity="1"></a-light>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#fff" opacity="0.4"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc"></a-cylinder>
</a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#fff" opacity="0.4"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00"></a-cylinder>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
