<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Cartoon Chemistry Lab 🧑‍🔬</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ffecd2,#fcb69f);
}

/* Panels */
.card{
position:absolute;
background:rgba(255,255,255,0.25);
backdrop-filter: blur(10px);
color:#333;
padding:15px;
border-radius:20px;
z-index:9999;
}

#hud{top:15px;left:15px;width:240px;}
#eduPanel{bottom:15px;left:15px;width:260px;}

#label{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:#ff9a9e;
padding:10px 20px;
border-radius:30px;
display:none;
z-index:9999;
}

/* Scientist */
#scientist{
position:absolute;
bottom:20px;
right:20px;
font-size:60px;
animation:float 2s infinite;
z-index:9999;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Speech */
#speech{
position:absolute;
bottom:100px;
right:20px;
background:white;
padding:8px 12px;
border-radius:10px;
display:none;
z-index:9999;
}

/* Inputs */
select,button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
}
</style>

<script>

let tubeAElement, tubeBElement
let liquidLevelA=0.45, liquidLevelB=0.45
let pouredAmount=0
let reactionStarted=false
let currentExperiment="neutralization"
let interval=null

const bubbleSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b33e1.mp3")
const fizzSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_8b8dbe6f90.mp3")

document.addEventListener("DOMContentLoaded",()=>{
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")

// ✅ FIXED DROPDOWN
document.getElementById("experimentSelect").addEventListener("change",(e)=>{
currentExperiment=e.target.value
resetExperiment()
})
})

function speak(t){ speechSynthesis.speak(new SpeechSynthesisUtterance(t)) }

function showSpeech(text){
const s=document.getElementById("speech")
s.innerText=text
s.style.display="block"
setTimeout(()=>s.style.display="none",2000)
}

AFRAME.registerComponent("pour-system",{
tick:function(){

const A=document.querySelector("#markerA")
const B=document.querySelector("#markerB")

if(!A.object3D.visible || !B.object3D.visible) return

const tilt=Math.abs(A.object3D.rotation.x*(180/Math.PI))
tubeAElement.setAttribute("rotation",`-${tilt} 0 0`)

const dist=A.object3D.position.distanceTo(B.object3D.position)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

if(dist<1.5 && tilt>40 && tipA.y>topB.y && !reactionStarted){

reactionStarted=true

document.getElementById("label").style.display="block"
document.getElementById("label").innerText="🧪 Mixing Started!"

document.getElementById("scientist").innerText="🧑‍🔬⚗️"

showSpeech("Let's mix chemicals!")
speak("Experiment started")

bubbleSound.play()

startPouring()
}
}
})

function startPouring(){

let count=0

interval=setInterval(()=>{

if(count>=40){
clearInterval(interval)

document.getElementById("label").innerText="🎉 Done!"
document.getElementById("scientist").innerText="🎉🧑‍🔬"

showSpeech("Wow! Reaction done!")
fizzSound.play()

return
}

createStream()

if(currentExperiment==="neutralization") createBubbles()
if(currentExperiment==="precipitation") createFoam()
if(currentExperiment==="exothermic") createSmoke()

count++

},100)
}

function createStream(){
let s=document.querySelector("#stream")
if(!s){
s=document.createElement("a-cylinder")
s.setAttribute("id","stream")
s.setAttribute("radius","0.03")
s.setAttribute("color","#00ccff")
document.querySelector("a-scene").appendChild(s)
}
}

function createBubbles(){
const b=document.createElement("a-sphere")
b.setAttribute("radius","0.02")
b.setAttribute("color","#aeefff")
b.setAttribute("position","0 1 0")
document.querySelector("a-scene").appendChild(b)
setTimeout(()=>b.remove(),1000)
}

function createFoam(){
const f=document.createElement("a-sphere")
f.setAttribute("radius","0.03")
f.setAttribute("color","#fff")
f.setAttribute("position","0 1 0")
document.querySelector("a-scene").appendChild(f)
setTimeout(()=>f.remove(),1000)
}

function createSmoke(){
const s=document.createElement("a-sphere")
s.setAttribute("radius","0.08")
s.setAttribute("color","#888")
s.setAttribute("position","0 1 0")
document.querySelector("a-scene").appendChild(s)
setTimeout(()=>s.remove(),1500)
}

function resetExperiment(){
reactionStarted=false
clearInterval(interval)
document.getElementById("label").style.display="none"
document.getElementById("scientist").innerText="👨‍🔬"
}

</script>
</head>

<body>

<div id="hud" class="card">
<h3>🧑‍🔬 Fun Lab</h3>

<select id="experimentSelect">
<option value="neutralization">🟢 Neutralization</option>
<option value="precipitation">⚪ Precipitation</option>
<option value="exothermic">🔴 Exothermic</option>
</select>

<button onclick="resetExperiment()">Reset</button>
</div>

<div id="label">Reaction</div>

<div id="eduPanel" class="card">
<h3>🧪 Learn</h3>
<p>🟢 Safe reaction</p>
<p>⚪ Solid forms</p>
<p>🔴 Heat reaction</p>
</div>

<div id="scientist">👨‍🔬</div>
<div id="speech">Hello!</div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system style="pointer-events:none;">

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA"></a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB"></a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
