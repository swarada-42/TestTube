7<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Camera View</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}
#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
border-left:5px solid #00ccff;
}
button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin:5px;
font-weight:bold;
font-size:16px;
}
.controls{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:1000;
}
.angle-display{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:72px;
font-weight:bold;
color:white;
text-shadow:0 0 20px rgba(0,255,0,0.8);
background:rgba(0,0,0,0.5);
padding:10px 40px;
border-radius:60px;
border:4px solid white;
z-index:1000;
}
.status{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
color:#ffaa00;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
z-index:1000;
border-right:5px solid #ffaa00;
}
.instruction{
position:absolute;
bottom:180px;
left:50%;
transform:translateX(-50%);
background:rgba(0,100,200,0.9);
color:white;
padding:15px 30px;
border-radius:50px;
font-size:18px;
font-weight:bold;
z-index:1000;
border:2px solid white;
white-space:nowrap;
}
</style>

<script>
let tubeAVisible=true;
let tubeBVisible=true;
let isDragging=false;
let reactionStarted=false;
let tubeAElement=null;
let tubeBElement=null;

let dragStartY=0;
let currentTilt=0;

const BLUE_COLOR='#0066cc';
const YELLOW_COLOR='#ffaa00';
const GREEN_COLOR='#00cc66';

let liquidLevelA=0.45;
let liquidLevelB=0.45;
let tiltAngle=0;
let pouredAmount=0;
const TRIGGER_ANGLE=45;
let hasTriggered=false;

document.addEventListener('DOMContentLoaded',function(){
const scene=document.querySelector('a-scene');

// Camera ready
scene.addEventListener('loaded',function(){
document.getElementById('cam-status').innerHTML = "✅ Camera ready";
document.getElementById('status').innerHTML = "👆 Drag BLUE tube UP to pour";
});

// Get tube elements
setTimeout(() => {
tubeAElement=document.querySelector('#tubeA');
tubeBElement=document.querySelector('#tubeB');
}, 1000);

// MOUSE EVENTS
scene.addEventListener('mousedown',function(e){
if(reactionStarted) return;
e.preventDefault();
dragStartY=e.clientY;
isDragging=true;
document.getElementById('status').innerHTML = "⬆️ Drag UP to increase tilt";
});

scene.addEventListener('mousemove',function(e){
if(!isDragging || reactionStarted || !tubeAElement) return;
e.preventDefault();

const deltaY = e.clientY - dragStartY;
if(deltaY < -10) { // Dragging UP
    tiltAngle = Math.min(90, Math.abs(deltaY) * 0.4);
    tubeAElement.setAttribute('rotation', `-${tiltAngle} 0 0`);
    document.querySelector('.angle-display').innerHTML = `${Math.round(tiltAngle)}°`;
    
    // Change color as we approach 45°
    if(tiltAngle >= TRIGGER_ANGLE) {
        document.querySelector('.angle-display').style.color = '#00ff00';
        document.querySelector('.angle-display').style.borderColor = '#00ff00';
        
        if(!hasTriggered) {
            startReaction();
        }
    } else {
        document.querySelector('.angle-display').style.color = 'white';
        document.querySelector('.angle-display').style.borderColor = 'white';
    }
    
    document.getElementById('status').innerHTML = `📐 ${Math.round(tiltAngle)}° / 45°`;
} else {
    tubeAElement.setAttribute('rotation', '0 0 0');
    tiltAngle=0;
    document.querySelector('.angle-display').innerHTML = '0°';
    document.querySelector('.angle-display').style.color = 'white';
    document.querySelector('.angle-display').style.borderColor = 'white';
}
});

scene.addEventListener('mouseup',function(){
isDragging=false;
if(!reactionStarted) {
    document.getElementById('status').innerHTML = "👆 Drag BLUE tube UP to 45°";
}
});

// TOUCH EVENTS for mobile
scene.addEventListener('touchstart',function(e){
if(reactionStarted) return;
e.preventDefault();
const touch=e.touches[0];
dragStartY=touch.clientY;
isDragging=true;
document.getElementById('status').innerHTML = "⬆️ Drag UP to increase tilt";
});

scene.addEventListener('touchmove',function(e){
if(!isDragging || reactionStarted || !tubeAElement) return;
e.preventDefault();
const touch=e.touches[0];

const deltaY = touch.clientY - dragStartY;
if(deltaY < -10) {
    tiltAngle = Math.min(90, Math.abs(deltaY) * 0.4);
    tubeAElement.setAttribute('rotation', `-${tiltAngle} 0 0`);
    document.querySelector('.angle-display').innerHTML = `${Math.round(tiltAngle)}°`;
    
    if(tiltAngle >= TRIGGER_ANGLE) {
        document.querySelector('.angle-display').style.color = '#00ff00';
        document.querySelector('.angle-display').style.borderColor = '#00ff00';
        
        if(!hasTriggered) {
            startReaction();
        }
    } else {
        document.querySelector('.angle-display').style.color = 'white';
        document.querySelector('.angle-display').style.borderColor = 'white';
    }
    
    document.getElementById('status').innerHTML = `📐 ${Math.round(tiltAngle)}° / 45°`;
} else {
    tubeAElement.setAttribute('rotation', '0 0 0');
    tiltAngle=0;
    document.querySelector('.angle-display').innerHTML = '0°';
    document.querySelector('.angle-display').style.color = 'white';
    document.querySelector('.angle-display').style.borderColor = 'white';
}
});

scene.addEventListener('touchend',function(){
isDragging=false;
if(!reactionStarted) {
    document.getElementById('status').innerHTML = "👆 Drag BLUE tube UP to 45°";
}
});

// Prevent default
scene.addEventListener('click',function(e){ e.preventDefault(); });
});

function startReaction() {
    hasTriggered=true;
    reactionStarted=true;
    document.getElementById('status').innerHTML = "⚡ 45° REACHED! REACTION STARTED! ⚡";
    document.getElementById('status').style.color = "#00ff00";
    document.querySelector('.instruction').innerHTML = "✅ POURING LIQUID... ✅";
    startPouring();
}

function startPouring() {
    let count=0;
    const interval=setInterval(() => {
        if(count>=35) {
            clearInterval(interval);
            completeReaction();
            return;
        }
        
        // Transfer liquid
        liquidLevelA = Math.max(0.1, liquidLevelA - 0.01);
        liquidLevelB = Math.min(0.6, liquidLevelB + 0.01);
        pouredAmount += 0.01;
        
        updateLiquidLevels();
        createDroplet();
        
        // Mix colors
        const mixPercent = pouredAmount / 0.35;
        if(mixPercent > 0) {
            mixLiquids(Math.min(1, mixPercent));
        }
        
        count++;
    }, 40);
}

function createDroplet() {
    if(!tubeAElement || !tubeBElement) return;
    
    for(let i=0; i<2; i++) {
        setTimeout(() => {
            const drop = document.createElement('a-sphere');
            drop.setAttribute('radius', '0.015');
            drop.setAttribute('color', BLUE_COLOR);
            drop.setAttribute('opacity', '0.9');
            
            // Start from blue tube
            const startX = tubeAElement.object3D.position.x;
            const startY = tubeAElement.object3D.position.y + 0.3;
            const startZ = tubeAElement.object3D.position.z;
            
            drop.setAttribute('position', {x: startX, y: startY, z: startZ});
            
            // End at yellow tube
            const endX = tubeBElement.object3D.position.x;
            const endY = tubeBElement.object3D.position.y + 0.4;
            const endZ = tubeBElement.object3D.position.z;
            
            drop.setAttribute('animation', {
                property: 'position',
                to: `${endX} ${endY} ${endZ}`,
                dur: 500,
                easing: 'easeInQuad'
            });
            
            drop.setAttribute('animation__opacity', {
                property: 'opacity',
                to: '0',
                dur: 500
            });
            
            document.querySelector('a-scene').appendChild(drop);
            setTimeout(() => drop.remove(), 500);
        }, i * 50);
    }
}

function updateLiquidLevels() {
    const liquidA = document.querySelector('#liquidA');
    const surfaceA = document.querySelector('#surfaceA');
    const liquidB = document.querySelector('#liquidB');
    const surfaceB = document.querySelector('#surfaceB');
    
    if(liquidA) {
        liquidA.setAttribute('height', liquidLevelA);
        liquidA.setAttribute('position', `0 ${0.15 + liquidLevelA/2} 0`);
    }
    if(surfaceA) {
        surfaceA.setAttribute('position', `0 ${0.15 + liquidLevelA} 0`);
    }
    if(liquidB) {
        liquidB.setAttribute('height', liquidLevelB);
        liquidB.setAttribute('position', `0 ${0.15 + liquidLevelB/2} 0`);
    }
    if(surfaceB) {
        surfaceB.setAttribute('position', `0 ${0.15 + liquidLevelB} 0`);
    }
}

function mixLiquids(amount) {
    if(amount <= 0) {
        document.querySelector('#liquidA')?.setAttribute('color', BLUE_COLOR);
        document.querySelector('#surfaceA')?.setAttribute('color', BLUE_COLOR);
        document.querySelector('#liquidB')?.setAttribute('color', YELLOW_COLOR);
        document.querySelector('#surfaceB')?.setAttribute('color', YELLOW_COLOR);
    } else if(amount >= 1) {
        document.querySelector('#liquidA')?.setAttribute('color', GREEN_COLOR);
        document.querySelector('#surfaceA')?.setAttribute('color', GREEN_COLOR);
        document.querySelector('#liquidB')?.setAttribute('color', GREEN_COLOR);
        document.querySelector('#surfaceB')?.setAttribute('color', GREEN_COLOR);
    } else {
        const r = Math.round(0 + 200 * amount);
        const g = Math.round(100 + 155 * amount);
        const b = Math.round(100 + 100 * amount);
        const mixedColor = `rgb(${r}, ${g}, ${b})`;
        document.querySelector('#liquidA')?.setAttribute('color', mixedColor);
        document.querySelector('#surfaceA')?.setAttribute('color', mixedColor);
        document.querySelector('#liquidB')?.setAttribute('color', mixedColor);
        document.querySelector('#surfaceB')?.setAttribute('color', mixedColor);
    }
}

function completeReaction() {
    document.getElementById('status').innerHTML = "🧪 REACTION COMPLETE!";
    document.querySelector('.instruction').innerHTML = "✅ SUCCESS! Press Reset to try again ✅";
    document.querySelector('.angle-display').innerHTML = "✅";
}

function resetExperiment() {
    reactionStarted = false;
    hasTriggered = false;
    isDragging = false;
    tiltAngle = 0;
    pouredAmount = 0;
    liquidLevelA = 0.45;
    liquidLevelB = 0.45;
    
    if(tubeAElement) {
        tubeAElement.setAttribute('rotation', '0 0 0');
    }
    
    updateLiquidLevels();
    mixLiquids(0);
    
    document.getElementById('status').innerHTML = "👆 Drag BLUE tube UP to 45°";
    document.getElementById('status').style.color = "white";
    document.querySelector('.instruction').innerHTML = "👆 DRAG BLUE TUBE UPWARD to 45° 👆";
    document.querySelector('.angle-display').innerHTML = '0°';
    document.querySelector('.angle-display').style.color = 'white';
    document.querySelector('.angle-display').style.borderColor = 'white';
}
</script>
</head>

<body>

<div id="hud">
<h2>🧪 AR Chemical Mixing</h2>
<div id="status">👆 Drag BLUE tube UP to pour</div>
<button onclick="resetExperiment()">🔄 Reset Experiment</button>
</div>

<div class="status" id="cam-status">
📷 Camera active
</div>

<div class="angle-display">0°</div>

<div class="instruction">
👆 DRAG BLUE TUBE UPWARD to 45° 👆
</div>

<a-scene embedded arjs="debugUIEnabled:false; trackingMethod:best;">

<a-light type="ambient" intensity="0.8"></a-light>
<a-light type="directional" position="1 2 1" intensity="0.6"></a-light>

<!-- Blue tube on HIRO marker -->
<a-marker id="markerA" type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/aframe/examples/image-based/data/hiro.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.6" transparent="true"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc" opacity="0.95"></a-cylinder>
<a-circle id="surfaceA" radius="0.13" position="0 0.45 0" color="#0066cc" rotation="-90 0 0"></a-circle>
<a-text value="BLUE" position="0 0.7 0" color="#0066cc" align="center"></a-text>
</a-entity>
</a-marker>

<!-- Yellow tube on KANJI marker -->
<a-marker id="markerB" type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/aframe/examples/image-based/data/kanji.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.6" transparent="true"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00" opacity="0.95"></a-cylinder>
<a-circle id="surfaceB" radius="0.13" position="0 0.45 0" color="#ffaa00" rotation="-90 0 0"></a-circle>
<a-text value="YELLOW" position="0 0.7 0" color="#ffaa00" align="center"></a-text>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
