<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Realistic Effects</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
}

#eduPanel{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
width:260px;
}

button, select{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:5px;
}

.angle-display{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
background:rgba(0,0,0,0.7);
padding:10px 40px;
border-radius:50px;
display:none;
}
</style>

<script>

let tubeAElement=null
let tubeBElement=null

let liquidLevelA=0.45
let liquidLevelB=0.45

let pouredAmount=0
let reactionStarted=false

let currentExperiment="neutralization"
let isPaused=false
let pourInterval=null

const REQUIRED_TILT=40
const REQUIRED_DISTANCE=1.5

document.addEventListener("DOMContentLoaded",()=>{
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")
})

AFRAME.registerComponent("pour-system",{
tick:function(){

const markerA=document.querySelector("#markerA")
const markerB=document.querySelector("#markerB")

if(!markerA.object3D.visible || !markerB.object3D.visible) return

const rotX=markerA.object3D.rotation.x*(180/Math.PI)
const tiltAngle=Math.abs(rotX)

tubeAElement.setAttribute("rotation",`-${tiltAngle} 0 0`)

const posA=markerA.object3D.getWorldPosition(new THREE.Vector3())
const posB=markerB.object3D.getWorldPosition(new THREE.Vector3())

const distance=posA.distanceTo(posB)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

if(distance<REQUIRED_DISTANCE && tiltAngle>REQUIRED_TILT && tipA.y>topB.y && !reactionStarted){
reactionStarted=true
startPouring()
}
}
})

// 🚀 POUR
function startPouring(){

let count=0

pourInterval=setInterval(()=>{

if(isPaused) return

if(count>=40){
clearInterval(pourInterval)
removeStream()
return
}

liquidLevelA-=0.01
liquidLevelB+=0.01

updateLiquidLevels()
createStream()

// effects
if(currentExperiment==="neutralization"){
createBubbles()
}
if(currentExperiment==="precipitation"){
createFoam()
}
if(currentExperiment==="exothermic"){
createSmoke()
}

count++

},50)
}

// 🌊 STREAM
function createStream(){

const posA=new THREE.Vector3()
const posB=new THREE.Vector3()

tubeAElement.object3D.getWorldPosition(posA)
tubeBElement.object3D.getWorldPosition(posB)

let stream=document.querySelector("#stream")

if(!stream){
stream=document.createElement("a-cylinder")
stream.setAttribute("id","stream")
stream.setAttribute("radius","0.03")
stream.setAttribute("color","#00ccff")
stream.setAttribute("opacity","0.8")
document.querySelector("a-scene").appendChild(stream)
}

const midX=(posA.x+posB.x)/2
const midY=(posA.y+posB.y)/2
const midZ=(posA.z+posB.z)/2

const dist=posA.distanceTo(posB)

stream.setAttribute("position",{x:midX,y:midY,z:midZ})
stream.setAttribute("height",dist)
stream.object3D.lookAt(posB)
}

function removeStream(){
const s=document.querySelector("#stream")
if(s) s.remove()
}

// 🫧 BUBBLES
function createBubbles(){

for(let i=0;i<4;i++){

const b=document.createElement("a-sphere")

b.setAttribute("radius",0.01+Math.random()*0.02)
b.setAttribute("color","#aeefff")
b.setAttribute("opacity",0.6)

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

b.setAttribute("position",{
x:pos.x+(Math.random()-0.5)*0.15,
y:pos.y+0.1,
z:pos.z+(Math.random()-0.5)*0.15
})

b.setAttribute("animation__rise",{
property:"position",
to:`${pos.x+(Math.random()-0.2)} ${pos.y+1} ${pos.z+(Math.random()-0.2)}`,
dur:1200
})

b.setAttribute("animation__fade",{
property:"opacity",
to:0,
dur:1200
})

document.querySelector("a-scene").appendChild(b)
setTimeout(()=>b.remove(),1200)
}
}

// 🫧 FOAM
function createFoam(){

for(let i=0;i<6;i++){

const f=document.createElement("a-sphere")

f.setAttribute("radius",0.02+Math.random()*0.03)
f.setAttribute("color","#ffffff")
f.setAttribute("opacity",0.9)

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

f.setAttribute("position",{
x:pos.x+(Math.random()-0.5)*0.2,
y:pos.y+0.35,
z:pos.z+(Math.random()-0.5)*0.2
})

f.setAttribute("animation",{
property:"position",
to:`${pos.x+(Math.random()-0.5)*0.3} ${pos.y+0.6} ${pos.z+(Math.random()-0.5)*0.3}`,
dur:1500
})

document.querySelector("a-scene").appendChild(f)
setTimeout(()=>f.remove(),1500)
}
}

// ☁️ SMOKE
function createSmoke(){

for(let i=0;i<3;i++){

const s=document.createElement("a-sphere")

s.setAttribute("radius",0.05+Math.random()*0.08)
s.setAttribute("color","#888888")
s.setAttribute("opacity",0.3)

const pos=new THREE.Vector3()
tubeBElement.object3D.getWorldPosition(pos)

s.setAttribute("position",{
x:pos.x+(Math.random()-0.5)*0.1,
y:pos.y+0.4,
z:pos.z+(Math.random()-0.5)*0.1
})

s.setAttribute("animation__rise",{
property:"position",
to:`${pos.x+(Math.random()-0.5)*0.5} ${pos.y+1.5} ${pos.z+(Math.random()-0.5)*0.5}`,
dur:2000
})

s.setAttribute("animation__fade",{
property:"opacity",
to:0,
dur:2000
})

document.querySelector("a-scene").appendChild(s)
setTimeout(()=>s.remove(),2000)
}
}

// 🔄 LIQUID LEVEL
function updateLiquidLevels(){

document.querySelector("#liquidA").setAttribute("height",liquidLevelA)
document.querySelector("#liquidA").setAttribute("position",`0 ${0.15+liquidLevelA/2} 0`)

document.querySelector("#liquidB").setAttribute("height",liquidLevelB)
document.querySelector("#liquidB").setAttribute("position",`0 ${0.15+liquidLevelB/2} 0`)
}

// 🔄 EXPERIMENT CHANGE
function changeExperiment(type){
currentExperiment=type
resetExperiment()
}

// 🔄 RESET
function resetExperiment(){

liquidLevelA=0.45
liquidLevelB=0.45
reactionStarted=false

if(pourInterval) clearInterval(pourInterval)
removeStream()

updateLiquidLevels()
}

</script>
</head>

<body>

<div id="hud">
<h3>AR Chemical Mixing</h3>

<select onchange="changeExperiment(this.value)">
<option value="neutralization">Neutralization</option>
<option value="precipitation">Precipitation</option>
<option value="exothermic">Exothermic</option>
</select>

<button onclick="resetExperiment()">Reset</button>
</div>

<div id="eduPanel">
<h3>Effects</h3>
<p>🫧 Gas (Neutralization)</p>
<p>🧼 Foam (Precipitation)</p>
<p>☁️ Smoke (Exothermic)</p>
</div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system>

<a-light type="ambient" intensity="0.8"></a-light>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc"></a-cylinder>
</a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00"></a-cylinder>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
