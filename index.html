<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Advanced Visuals</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
}

#eduPanel{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
width:260px;
}

button, select{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:5px;
}

.angle-display{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
background:rgba(0,0,0,0.7);
padding:10px 40px;
border-radius:50px;
display:none;
}
</style>

<script>

let tubeAElement=null
let tubeBElement=null

let liquidLevelA=0.45
let liquidLevelB=0.45

let tiltAngle=0
let pouredAmount=0
let reactionStarted=false

let currentExperiment="neutralization"
let isPaused=false
let pourInterval=null

const BLUE='#0066cc'
const YELLOW='#ffaa00'
const GREEN='#00cc66'

const REQUIRED_TILT=40
const REQUIRED_DISTANCE=1.5

document.addEventListener("DOMContentLoaded",function(){
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")
mixLiquids(0)
})

AFRAME.registerComponent("pour-system",{
tick:function(){

const markerA=document.querySelector("#markerA")
const markerB=document.querySelector("#markerB")

if(!markerA.object3D.visible || !markerB.object3D.visible){
document.getElementById("status").innerText="Show both markers"
return
}

const rotX=markerA.object3D.rotation.x*(180/Math.PI)
tiltAngle=Math.abs(rotX)

tubeAElement.setAttribute("rotation",`-${tiltAngle} 0 0`)

if(tiltAngle>10){
document.querySelector(".angle-display").style.display="block"
document.querySelector(".angle-display").innerText=Math.round(tiltAngle)+"°"
}else{
document.querySelector(".angle-display").style.display="none"
}

const posA=markerA.object3D.getWorldPosition(new THREE.Vector3())
const posB=markerB.object3D.getWorldPosition(new THREE.Vector3())

const distance=posA.distanceTo(posB)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

const verticalCheck=tipA.y>topB.y

if(distance<REQUIRED_DISTANCE && tiltAngle>REQUIRED_TILT && verticalCheck && !reactionStarted){
reactionStarted=true
document.getElementById("status").innerText="Pouring..."
startPouring()
}

}
})

function startPouring(){

let count=0
const totalSteps=40

pourInterval=setInterval(()=>{

if(isPaused) return

if(count>=totalSteps){
clearInterval(pourInterval)
removeStream()
document.getElementById("status").innerText="Reaction Complete!"
return
}

liquidLevelA=Math.max(0.1,liquidLevelA-0.01)
liquidLevelB=Math.min(0.6,liquidLevelB+0.01)

pouredAmount+=0.01

updateLiquidLevels()
createRealisticStream()

// effects
if(currentExperiment==="neutralization"){
createGasBubbles()
}
if(currentExperiment==="precipitation"){
createFoam()
}
if(currentExperiment==="exothermic"){
createSmoke()
}

mixLiquids(Math.min(1,pouredAmount/0.35))

count++

},50)

}

// 🌊 REALISTIC STREAM
function createRealisticStream(){

const posA=new THREE.Vector3()
const posB=new THREE.Vector3()

tubeAElement.object3D.getWorldPosition(posA)
tubeBElement.object3D.getWorldPosition(posB)

let stream=document.querySelector("#liquidStream")

if(!stream){
stream=document.createElement("a-cylinder")
stream.setAttribute("id","liquidStream")
stream.setAttribute("radius","0.03")
stream.setAttribute("color","#00ccff")
stream.setAttribute("opacity","0.8")
document.querySelector("a-scene").appendChild(stream)
}

const midX=(posA.x+posB.x)/2
const midY=(posA.y+posB.y)/2
const midZ=(posA.z+posB.z)/2

const distance=posA.distanceTo(posB)

stream.setAttribute("position",{x:midX,y:midY,z:midZ})
stream.setAttribute("height",distance)

stream.object3D.lookAt(posB)
}

function removeStream(){
const stream=document.querySelector("#liquidStream")
if(stream) stream.remove()
}

// 🫧 GAS
function createGasBubbles(){

for(let i=0;i<2;i++){
const bubble=document.createElement("a-sphere")

bubble.setAttribute("radius","0.02")
bubble.setAttribute("color","#00ffff")
bubble.setAttribute("opacity","0.7")

const pos=tubeBElement.object3D.position

bubble.setAttribute("position",{
x:pos.x+(Math.random()-0.5)*0.3,
y:pos.y+0.2,
z:pos.z+(Math.random()-0.5)*0.3
})

bubble.setAttribute("animation",{
property:"position",
to:`${pos.x} ${pos.y+0.8} ${pos.z}`,
dur:1200
})

document.querySelector("a-scene").appendChild(bubble)
setTimeout(()=>bubble.remove(),1200)
}
}

// 🫧 FOAM
function createFoam(){

const foam=document.createElement("a-cylinder")

foam.setAttribute("radius","0.14")
foam.setAttribute("height","0.05")
foam.setAttribute("color","#ffffff")
foam.setAttribute("opacity","0.9")

const pos=tubeBElement.object3D.position

foam.setAttribute("position",{
x:pos.x,
y:pos.y + liquidLevelB/2 + 0.3,
z:pos.z
})

document.querySelector("a-scene").appendChild(foam)
setTimeout(()=>foam.remove(),1500)
}

// ☁️ SMOKE
function createSmoke(){

const smoke=document.createElement("a-sphere")

smoke.setAttribute("radius","0.08")
smoke.setAttribute("color","#aaaaaa")
smoke.setAttribute("opacity","0.4")

const pos=tubeBElement.object3D.position

smoke.setAttribute("position",{
x:pos.x,
y:pos.y+0.5,
z:pos.z
})

smoke.setAttribute("animation",{
property:"position",
to:`${pos.x} ${pos.y+1.2} ${pos.z}`,
dur:1500
})

document.querySelector("a-scene").appendChild(smoke)
setTimeout(()=>smoke.remove(),1500)
}

function updateLiquidLevels(){

document.querySelector("#liquidA").setAttribute("height",liquidLevelA)
document.querySelector("#liquidA").setAttribute("position",`0 ${0.15+liquidLevelA/2} 0`)

document.querySelector("#liquidB").setAttribute("height",liquidLevelB)
document.querySelector("#liquidB").setAttribute("position",`0 ${0.15+liquidLevelB/2} 0`)
}

function mixLiquids(amount){

if(currentExperiment==="neutralization"){
if(amount<=0) setColor(BLUE,YELLOW)
else if(amount>=1) setColor(GREEN,GREEN)
else blendColor(amount)
}

else if(currentExperiment==="precipitation"){
if(amount>=0.5) setColor("#ffffff","#ffffff")
}

else if(currentExperiment==="exothermic"){
if(amount>=0.5) setColor("#ff3300","#ff6600")
}

}

function setColor(a,b){
document.querySelector("#liquidA").setAttribute("color",a)
document.querySelector("#liquidB").setAttribute("color",b)
}

function blendColor(amount){
const r=Math.round(200*amount)
const g=Math.round(100+155*amount)
const b=Math.round(100+100*amount)
const color=`rgb(${r},${g},${b})`
setColor(color,color)
}

function changeExperiment(type){

currentExperiment=type
resetExperiment()

if(type==="neutralization"){
updateInfo("Neutralization","HCl + NaOH → NaCl + H₂O","Acid + Base → Salt + Water")
}
else if(type==="precipitation"){
updateInfo("Precipitation","AgNO₃ + NaCl → AgCl ↓","Solid forms")
}
else{
updateInfo("Exothermic","CaO + H₂O → Ca(OH)₂ + Heat","Heat released")
}
}

function updateInfo(name,eq,desc){
document.getElementById("reactionName").innerText=name
document.getElementById("reactionEquation").innerText=eq
document.getElementById("reactionDesc").innerText=desc
}

function togglePause(){
isPaused=!isPaused
}

function resetExperiment(){

liquidLevelA=0.45
liquidLevelB=0.45
pouredAmount=0
reactionStarted=false

if(pourInterval) clearInterval(pourInterval)
removeStream()

updateLiquidLevels()
mixLiquids(0)

document.getElementById("status").innerText="Scan markers"
}

</script>
</head>

<body>

<div id="hud">
<h3>AR Chemical Mixing</h3>
<p id="status">Scan both markers</p>

<select onchange="changeExperiment(this.value)">
<option value="neutralization">Neutralization</option>
<option value="precipitation">Precipitation</option>
<option value="exothermic">Exothermic</option>
</select>

<button onclick="togglePause()">Pause</button>
<button onclick="resetExperiment()">Reset</button>
</div>

<div id="eduPanel">
<h3>Experiment Info</h3>
<p id="reactionName">Neutralization</p>
<p id="reactionEquation">HCl + NaOH → NaCl + H₂O</p>
<p id="reactionDesc">Acid + Base → Salt + Water</p>
</div>

<div class="angle-display">0°</div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system>

<a-light type="ambient" intensity="0.8"></a-light>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc"></a-cylinder>
</a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00"></a-cylinder>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
