<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Marker Rotation Control</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}
#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
border-left:5px solid #00ccff;
}
button{
background:#4CAF50;
color:white;
border:none;
padding:8px 16px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
width:100%;
font-weight:bold;
}
.position-info{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:15px;
border-radius:5px;
font-size:14px;
z-index:1000;
min-width:220px;
border-right:5px solid #ffaa00;
}
.instruction{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,100,200,0.9);
color:white;
padding:15px 30px;
border-radius:50px;
text-align:center;
font-size:18px;
font-weight:bold;
z-index:1000;
border:2px solid white;
}
.angle-display{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
font-size:72px;
font-weight:bold;
color:white;
text-shadow:0 0 20px rgba(0,255,0,0.5);
background:rgba(0,0,0,0.6);
padding:10px 40px;
border-radius:60px;
border:4px solid white;
z-index:1000;
}
.marker-status{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
color:#ffaa00;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
z-index:1000;
}
</style>

<script>
let tubeAVisible=false;
let tubeBVisible=false;
let reactionStarted=false;
let reactionComplete=false;
let tubeAElement=null;
let tubeBElement=null;
let markerARotation=0;

let liquidLevelA=0.45;
let liquidLevelB=0.45;
let tiltAngle=0;
let pouredAmount=0;

const BLUE_COLOR='#0066cc';
const YELLOW_COLOR='#ffaa00';
const GREEN_COLOR='#00cc66';
const TRIGGER_ANGLE=45;
let hasTriggered=false;

document.addEventListener('DOMContentLoaded',function(){
const scene=document.querySelector('a-scene');

// Marker Found
scene.addEventListener('markerFound',function(e){
if(e.target.id==='markerA'){
tubeAVisible=true;
tubeAElement=document.querySelector('#tubeA');
document.getElementById('status').textContent="✅ Blue tube ready";
document.getElementById('status').style.color="#00ff00";
updateLiquidLevels();
}
if(e.target.id==='markerB'){
tubeBVisible=true;
tubeBElement=document.querySelector('#tubeB');
document.getElementById('status').textContent="✅ Yellow tube ready";
document.getElementById('status').style.color="#00ff00";
}
if(tubeAVisible && tubeBVisible){
document.getElementById('status').textContent="🎯 READY! Tilt BLUE marker to 45°";
document.querySelector('.instruction').innerHTML="🔄 TILT BLUE MARKER FORWARD to 45° 🔄";
}
});

// Marker Lost
scene.addEventListener('markerLost',function(e){
if(e.target.id==='markerA'){
tubeAVisible=false;
document.getElementById('status').textContent="❌ Show blue marker";
}
if(e.target.id==='markerB'){
tubeBVisible=false;
document.getElementById('status').textContent="❌ Show yellow marker";
}
});

// TRACK MARKER ROTATION - THIS IS THE KEY PART
scene.addEventListener('markerPoseFound', function(e) {
    const marker = e.target;
    
    // Track Blue marker (Marker A) rotation for pouring
    if(marker.id === 'markerA' && marker.object3D && tubeAElement && !reactionComplete) {
        // Get rotation in degrees
        const rotation = marker.object3D.rotation;
        const rotX = rotation.x * (180 / Math.PI); // Forward/backward tilt
        const rotY = rotation.y * (180 / Math.PI); // Left/right rotation
        const rotZ = rotation.z * (180 / Math.PI); // Side tilt
        
        // Only consider forward tilt (positive X rotation)
        if(rotX > 5) {
            tiltAngle = Math.min(90, rotX);
            
            // Apply rotation to tube - FORWARD TILT = POURING
            tubeAElement.setAttribute('rotation', `-${tiltAngle} ${rotY} ${rotZ}`);
            
            // Update angle display
            document.querySelector('.angle-display').innerHTML = `${Math.round(tiltAngle)}°`;
            document.querySelector('.angle-display').style.display = 'block';
            
            // Visual feedback based on angle
            if(tiltAngle >= TRIGGER_ANGLE) {
                document.querySelector('.angle-display').style.color = '#00ff00';
                document.querySelector('.angle-display').style.borderColor = '#00ff00';
                
                // TRIGGER REACTION AT 45°
                if(!hasTriggered && !reactionStarted) {
                    triggerReaction();
                }
            } else {
                document.querySelector('.angle-display').style.color = 'white';
                document.querySelector('.angle-display').style.borderColor = 'white';
            }
            
            document.getElementById('status').textContent = `📐 Tilt: ${Math.round(tiltAngle)}° / 45°`;
        } else {
            // No tilt - upright position
            tiltAngle = 0;
            tubeAElement.setAttribute('rotation', `0 ${rotY} ${rotZ}`);
            document.querySelector('.angle-display').style.display = 'none';
            if(!reactionStarted && !reactionComplete) {
                document.getElementById('status').textContent = "✅ Ready - Tilt marker to 45°";
            }
        }
        
        updatePositionInfo();
    }
    
    // Track Yellow marker (Marker B) rotation - just for orientation
    if(marker.id === 'markerB' && marker.object3D && tubeBElement) {
        const rotation = marker.object3D.rotation;
        const rotY = rotation.y * (180 / Math.PI);
        const rotZ = rotation.z * (180 / Math.PI);
        // Keep yellow tube upright (no tilt)
        tubeBElement.setAttribute('rotation', `0 ${rotY} ${rotZ}`);
    }
});

});

function triggerReaction() {
    hasTriggered = true;
    reactionStarted = true;
    
    document.getElementById('status').textContent = "⚡ 45° REACHED! REACTION STARTED! ⚡";
    document.querySelector('.instruction').innerHTML = "✅ CHEMICAL REACTION IN PROGRESS... ✅";
    
    // Start pouring animation
    startPouringAnimation();
}

function startPouringAnimation() {
    let pourCount = 0;
    const totalSteps = 35;
    
    const pourInterval = setInterval(() => {
        if(pourCount >= totalSteps || reactionComplete) {
            clearInterval(pourInterval);
            if(!reactionComplete) {
                completeReaction();
            }
            return;
        }
        
        // Transfer liquid
        liquidLevelA = Math.max(0.1, liquidLevelA - 0.012);
        liquidLevelB = Math.min(0.6, liquidLevelB + 0.012);
        pouredAmount += 0.012;
        
        updateLiquidLevels();
        
        // Create droplets
        for(let i=0; i<4; i++) {
            setTimeout(() => createDroplet(), i*30);
        }
        
        // Update colors
        const mixPercent = pouredAmount / 0.35;
        mixLiquids(Math.min(1, mixPercent));
        
        pourCount++;
    }, 40);
}

function createDroplet() {
    if(!tubeAElement || !tubeBElement) return;
    
    const drop = document.createElement('a-sphere');
    drop.setAttribute('radius', '0.015');
    drop.setAttribute('color', BLUE_COLOR);
    drop.setAttribute('opacity', '0.9');
    
    // Position at tilted tube opening (using 45° for visual effect)
    const tiltRad = 45 * Math.PI / 180;
    const startX = tubeAElement.object3D.position.x + (Math.random() - 0.5) * 0.05;
    const startY = tubeAElement.object3D.position.y + 0.3 - Math.sin(tiltRad) * 0.3;
    const startZ = tubeAElement.object3D.position.z + Math.cos(tiltRad) * 0.3;
    
    drop.setAttribute('position', {x: startX, y: startY, z: startZ});
    
    // Target yellow tube
    const targetX = tubeBElement.object3D.position.x + (Math.random() - 0.5) * 0.08;
    const targetY = tubeBElement.object3D.position.y + 0.4;
    const targetZ = tubeBElement.object3D.position.z + (Math.random() - 0.5) * 0.08;
    
    drop.setAttribute('animation', {
        property: 'position',
        to: `${targetX} ${targetY} ${targetZ}`,
        dur: 500,
        easing: 'easeInQuad'
    });
    
    drop.setAttribute('animation__opacity', {
        property: 'opacity',
        to: '0',
        dur: 500
    });
    
    document.querySelector('a-scene').appendChild(drop);
    setTimeout(() => drop.remove(), 500);
}

function updateLiquidLevels() {
    const liquidA = document.querySelector('#liquidA');
    const surfaceA = document.querySelector('#surfaceA');
    const liquidB = document.querySelector('#liquidB');
    const surfaceB = document.querySelector('#surfaceB');
    
    if(liquidA) {
        liquidA.setAttribute('height', liquidLevelA);
        liquidA.setAttribute('position', `0 ${0.15 + liquidLevelA/2} 0`);
    }
    if(surfaceA) surfaceA.setAttribute('position', `0 ${0.15 + liquidLevelA} 0`);
    if(liquidB) {
        liquidB.setAttribute('height', liquidLevelB);
        liquidB.setAttribute('position', `0 ${0.15 + liquidLevelB/2} 0`);
    }
    if(surfaceB) surfaceB.setAttribute('position', `0 ${0.15 + liquidLevelB} 0`);
}

function mixLiquids(amount) {
    if(amount <= 0) {
        document.querySelector('#liquidA')?.setAttribute('color', BLUE_COLOR);
        document.querySelector('#surfaceA')?.setAttribute('color', BLUE_COLOR);
        document.querySelector('#liquidB')?.setAttribute('color', YELLOW_COLOR);
        document.querySelector('#surfaceB')?.setAttribute('color', YELLOW_COLOR);
    } else if(amount >= 1) {
        document.querySelector('#liquidA')?.setAttribute('color', GREEN_COLOR);
        document.querySelector('#surfaceA')?.setAttribute('color', GREEN_COLOR);
        document.querySelector('#liquidB')?.setAttribute('color', GREEN_COLOR);
        document.querySelector('#surfaceB')?.setAttribute('color', GREEN_COLOR);
    } else {
        const r = Math.round(0 + 200 * amount);
        const g = Math.round(100 + 155 * amount);
        const b = Math.round(100 + 100 * amount);
        const mixedColor = `rgb(${r}, ${g}, ${b})`;
        document.querySelector('#liquidA')?.setAttribute('color', mixedColor);
        document.querySelector('#surfaceA')?.setAttribute('color', mixedColor);
        document.querySelector('#liquidB')?.setAttribute('color', mixedColor);
        document.querySelector('#surfaceB')?.setAttribute('color', mixedColor);
    }
}

function updatePositionInfo() {
    if(tubeAElement && tubeBElement) {
        const posA = tubeAElement.object3D.position;
        const posB = tubeBElement.object3D.position;
        const distance = Math.sqrt(Math.pow(posA.x-posB.x,2) + Math.pow(posA.z-posB.z,2));
        
        document.getElementById('position-info').innerHTML = 
            '<strong>🔵 BLUE TUBE (Marker A)</strong><br>' +
            'Tilt: ' + Math.round(tiltAngle) + '°<br>' +
            'Target: 45°<br>' +
            'Progress: ' + Math.min(100, Math.round((tiltAngle/45)*100)) + '%<br>' +
            'Liquid: ' + Math.round((liquidLevelA/0.45)*100) + '%<br>' +
            '<strong>🟡 YELLOW TUBE (Marker B)</strong><br>' +
            'Liquid: ' + Math.round((liquidLevelB/0.45)*100) + '%<br>' +
            '<strong>📏 Distance: ' + distance.toFixed(2) + '</strong><br>' +
            '<strong>💧 Poured: ' + Math.round((pouredAmount/0.35)*100) + '%</strong>';
    }
}

function completeReaction() {
    reactionComplete = true;
    reactionStarted = false;
    mixLiquids(1.0);
    
    document.getElementById('status').textContent = "🧪 REACTION COMPLETE!";
    document.querySelector('.instruction').innerHTML = "✅ SUCCESS! Press Reset to try again ✅";
    document.querySelector('.angle-display').innerHTML = "✅";
    document.querySelector('.angle-display').style.color = '#00ff00';
}

function resetExperiment() {
    reactionStarted = false;
    reactionComplete = false;
    hasTriggered = false;
    tiltAngle = 0;
    pouredAmount = 0;
    liquidLevelA = 0.45;
    liquidLevelB = 0.45;
    
    if(tubeAElement) {
        tubeAElement.object3D.position.set(0, 0, 0);
        tubeAElement.setAttribute('rotation', '0 0 0');
    }
    if(tubeBElement) {
        tubeBElement.object3D.position.set(0, 0, 0);
        tubeBElement.setAttribute('rotation', '0 0 0');
    }
    
    updateLiquidLevels();
    mixLiquids(0);
    
    document.getElementById('status').textContent = "Scan both markers";
    document.getElementById('status').style.color = "white";
    updatePositionInfo();
    document.querySelector('.instruction').innerHTML = "📷 Show both markers to camera";
    document.querySelector('.angle-display').style.display = 'none';
}
</script>
</head>

<body>

<div id="hud">
<h3>🧪 Marker Rotation Control</h3>
<p id="status">Scan both markers</p>
<button onclick="resetExperiment()">🔄 Reset Experiment</button>
</div>

<div class="position-info" id="position-info">
<strong>🔵 BLUE TUBE (Marker A)</strong><br>
Tilt: 0°<br>
Target: 45°<br>
Progress: 0%<br>
Liquid: 100%<br>
<strong>🟡 YELLOW TUBE (Marker B)</strong><br>
Liquid: 100%<br>
<strong>📏 Distance: --</strong><br>
<strong>💧 Poured: 0%</strong>
</div>

<div class="angle-display" style="display:none;">0°</div>

<div class="instruction">
📷 Show both markers to camera
</div>

<a-scene embedded arjs="debugUIEnabled:false; trackingMethod:best;">

<a-light type="ambient" intensity="0.8"></a-light>
<a-light type="directional" position="1 2 1" intensity="0.6"></a-light>

<!-- Blue tube marker (Marker A) -->
<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.55" transparent="true"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0" color="#0066cc" opacity="0.95"></a-cylinder>
<a-circle id="surfaceA" radius="0.13" position="0 0.45 0" color="#0066cc" rotation="-90 0 0"></a-circle>
<a-text value="BLUE" position="0 0.7 0" color="#0066cc" align="center"></a-text>
</a-entity>
</a-marker>

<!-- Yellow tube marker (Marker B) -->
<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#ffffff" opacity="0.55" transparent="true"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0" color="#ffaa00" opacity="0.95"></a-cylinder>
<a-circle id="surfaceB" radius="0.13" position="0 0.45 0" color="#ffaa00" rotation="-90 0 0"></a-circle>
<a-text value="YELLOW" position="0 0.7 0" color="#ffaa00" align="center"></a-text>
</a-entity>
</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
