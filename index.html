<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Real Pour Detection</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:1000;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
margin-top:5px;
cursor:pointer;
}

.angle-display{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
font-weight:bold;
color:white;
background:rgba(0,0,0,0.7);
padding:10px 40px;
border-radius:50px;
display:none;
}

.debug{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
color:#00ffcc;
padding:10px 15px;
border-radius:10px;
font-size:14px;
}
</style>

<script>

let tubeAElement=null
let tubeBElement=null

let liquidLevelA=0.45
let liquidLevelB=0.45

let tiltAngle=0
let pouredAmount=0
let reactionStarted=false

const BLUE='#0066cc'
const YELLOW='#ffaa00'
const GREEN='#00cc66'

const REQUIRED_TILT = 40
const REQUIRED_DISTANCE = 1.5

document.addEventListener("DOMContentLoaded",function(){

tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")

mixLiquids(0)

})

AFRAME.registerComponent("pour-system",{

tick:function(){

const markerA=document.querySelector("#markerA")
const markerB=document.querySelector("#markerB")

if(!markerA.object3D.visible || !markerB.object3D.visible){
document.getElementById("status").innerText="Show both markers"
return
}

const rot=markerA.object3D.rotation
const rotX=rot.x*(180/Math.PI)

tiltAngle=Math.abs(rotX)

tubeAElement.setAttribute("rotation",`-${tiltAngle} 0 0`)

if(tiltAngle>10){
document.querySelector(".angle-display").style.display="block"
document.querySelector(".angle-display").innerText=Math.round(tiltAngle)+"°"
}else{
document.querySelector(".angle-display").style.display="none"
}

const posA=markerA.object3D.getWorldPosition(new THREE.Vector3())
const posB=markerB.object3D.getWorldPosition(new THREE.Vector3())

const distance=posA.distanceTo(posB)

const tipA = new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB = new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

const verticalCheck = tipA.y > topB.y

document.querySelector(".debug").innerHTML =
"Distance: "+distance.toFixed(2)+"<br>"+
"Tilt: "+tiltAngle.toFixed(1)+"<br>"+
"Above: "+verticalCheck

if(distance < REQUIRED_DISTANCE && tiltAngle > REQUIRED_TILT && verticalCheck && !reactionStarted){

reactionStarted=true
document.getElementById("status").innerText="Pouring..."

startPouring()

}

}

})

function startPouring(){

let count=0
const totalSteps=40

const interval=setInterval(()=>{

if(count>=totalSteps){
clearInterval(interval)
document.getElementById("status").innerText="Reaction Complete!"
return
}

liquidLevelA=Math.max(0.1,liquidLevelA-0.01)
liquidLevelB=Math.min(0.6,liquidLevelB+0.01)

pouredAmount+=0.01

updateLiquidLevels()

if(Math.random()<0.3){
createDroplet()
}

mixLiquids(Math.min(1,pouredAmount/0.35))

count++

},50)

}

function updateLiquidLevels(){

const liquidA=document.querySelector("#liquidA")
const liquidB=document.querySelector("#liquidB")

if(liquidA){
liquidA.setAttribute("height",liquidLevelA)
liquidA.setAttribute("position",`0 ${0.15+liquidLevelA/2} 0`)
}

if(liquidB){
liquidB.setAttribute("height",liquidLevelB)
liquidB.setAttribute("position",`0 ${0.15+liquidLevelB/2} 0`)
}

}

function createDroplet(){

const drop=document.createElement("a-sphere")

drop.setAttribute("radius","0.02")
drop.setAttribute("color",BLUE)

const startX=tubeAElement.object3D.position.x
const startY=tubeAElement.object3D.position.y+0.3
const startZ=tubeAElement.object3D.position.z

drop.setAttribute("position",{x:startX,y:startY,z:startZ})

const targetX=tubeBElement.object3D.position.x
const targetY=tubeBElement.object3D.position.y+0.4
const targetZ=tubeBElement.object3D.position.z

drop.setAttribute("animation",{
property:"position",
to:`${targetX} ${targetY} ${targetZ}`,
dur:500
})

document.querySelector("a-scene").appendChild(drop)

setTimeout(()=>drop.remove(),500)

}

function mixLiquids(amount){

if(amount<=0){
document.querySelector("#liquidA").setAttribute("color",BLUE)
document.querySelector("#liquidB").setAttribute("color",YELLOW)
}
else if(amount>=1){
document.querySelector("#liquidA").setAttribute("color",GREEN)
document.querySelector("#liquidB").setAttribute("color",GREEN)
}
else{

const r=Math.round(0+200*amount)
const g=Math.round(100+155*amount)
const b=Math.round(100+100*amount)

const color=`rgb(${r},${g},${b})`

document.querySelector("#liquidA").setAttribute("color",color)
document.querySelector("#liquidB").setAttribute("color",color)

}

}

function resetExperiment(){

liquidLevelA=0.45
liquidLevelB=0.45
pouredAmount=0
reactionStarted=false

updateLiquidLevels()
mixLiquids(0)

document.getElementById("status").innerText="Scan markers"

}

</script>
</head>

<body>

<div id="hud">
<h3>AR Chemical Mixing</h3>
<p id="status">Scan both markers</p>
<button onclick="resetExperiment()">Reset</button>
</div>

<div class="angle-display">0°</div>

<div class="debug"></div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system>

<a-light type="ambient" intensity="0.8"></a-light>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">

<a-entity id="tubeA">

<a-cylinder radius="0.15" height="0.6" position="0 0.3 0"
color="#ffffff" opacity="0.5"></a-cylinder>

<a-cylinder id="liquidA"
radius="0.13"
height="0.45"
position="0 0.225 0"
color="#0066cc"></a-cylinder>

</a-entity>

</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">

<a-entity id="tubeB">

<a-cylinder radius="0.15" height="0.6" position="0 0.3 0"
color="#ffffff" opacity="0.5"></a-cylinder>

<a-cylinder id="liquidB"
radius="0.13"
height="0.45"
position="0 0.225 0"
color="#ffaa00"></a-cylinder>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
