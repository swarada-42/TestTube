<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Chemical Mixing - Fixed</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:Segoe UI;}

.panel{
position:absolute;
background:rgba(0,0,0,0.6);
color:white;
padding:15px;
border-radius:15px;
}

#hud{top:10px;left:10px;width:220px;}
#meters{top:10px;right:10px;width:220px;}

.bar{height:10px;background:#444;border-radius:10px;}
.fill{height:100%;width:50%;background:lime;}

#label{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:20px;
display:none;
}
</style>

<script>

let tubeAElement, tubeBElement
let liquidLevelA=0.45, liquidLevelB=0.45
let pouredAmount=0
let reactionStarted=false
let currentExperiment="neutralization"
let interval=null
let temperature=25, ph=7

document.addEventListener("DOMContentLoaded",()=>{
tubeAElement=document.querySelector("#tubeA")
tubeBElement=document.querySelector("#tubeB")
})

function speak(text){
speechSynthesis.speak(new SpeechSynthesisUtterance(text))
}

AFRAME.registerComponent("pour-system",{
tick:function(){

const markerA=document.querySelector("#markerA")
const markerB=document.querySelector("#markerB")

if(!markerA.object3D.visible || !markerB.object3D.visible) return

const tilt=Math.abs(markerA.object3D.rotation.x*(180/Math.PI))
tubeAElement.setAttribute("rotation",`-${tilt} 0 0`)

const posA=markerA.object3D.getWorldPosition(new THREE.Vector3())
const posB=markerB.object3D.getWorldPosition(new THREE.Vector3())

const dist=posA.distanceTo(posB)

const tipA=new THREE.Vector3(0,0.6,0)
tubeAElement.object3D.localToWorld(tipA)

const topB=new THREE.Vector3(0,0.6,0)
tubeBElement.object3D.localToWorld(topB)

if(dist<1.5 && tilt>40 && tipA.y>topB.y && !reactionStarted){
reactionStarted=true

document.getElementById("label").style.display="block"
document.getElementById("label").innerText="Reaction Started ⚗️"

speak("Reaction started")

startPouring()
}
}
})

function startPouring(){

let count=0

interval=setInterval(()=>{

if(count>=40){
clearInterval(interval)
document.getElementById("label").innerText="Reaction Complete ✅"
applyFinalColor()
return
}

liquidLevelA-=0.01
liquidLevelB+=0.01
pouredAmount+=0.01

updateLiquidLevels()
createStream()

if(currentExperiment==="neutralization") createBubbles()
if(currentExperiment==="precipitation") createFoam()
if(currentExperiment==="exothermic") createSmoke()

updateTemperature()
updatePH()

count++

},50)
}

function createStream(){
let s=document.querySelector("#stream")
if(!s){
s=document.createElement("a-cylinder")
s.setAttribute("id","stream")
s.setAttribute("radius","0.03")
s.setAttribute("color","#00ccff")
document.querySelector("a-scene").appendChild(s)
}
}

function updateLiquidLevels(){
document.querySelector("#liquidA").setAttribute("height",liquidLevelA)
document.querySelector("#liquidB").setAttribute("height",liquidLevelB)
}

function applyFinalColor(){
let color="#00cc66"
if(currentExperiment==="precipitation") color="#ffffff"
if(currentExperiment==="exothermic") color="#ff3300"
setColor(color)
}

function setColor(c){
document.querySelector("#liquidA").setAttribute("color",c)
document.querySelector("#liquidB").setAttribute("color",c)
}

// ✅ REAL EFFECTS (FIXED)

function createBubbles(){
const b=document.createElement("a-sphere")
b.setAttribute("radius","0.02")
b.setAttribute("color","#aeefff")
b.setAttribute("position","0 1 0")
document.querySelector("a-scene").appendChild(b)
setTimeout(()=>b.remove(),1000)
}

function createFoam(){
const f=document.createElement("a-sphere")
f.setAttribute("radius","0.03")
f.setAttribute("color","#ffffff")
f.setAttribute("position","0 1 0")
document.querySelector("a-scene").appendChild(f)
setTimeout(()=>f.remove(),1000)
}

function createSmoke(){
const s=document.createElement("a-sphere")
s.setAttribute("radius","0.08")
s.setAttribute("color","#888")
s.setAttribute("position","0 1 0")
document.querySelector("a-scene").appendChild(s)
setTimeout(()=>s.remove(),1500)
}

// 🌡️ TEMP
function updateTemperature(){
if(currentExperiment==="exothermic") temperature+=1
document.getElementById("tempText").innerText=temperature+"°C"
document.getElementById("tempFill").style.width=temperature+"%"
}

// 🧪 PH
function updatePH(){
ph += (7-ph)*0.1
document.getElementById("phText").innerText=ph.toFixed(1)
document.getElementById("phFill").style.width=(ph/14)*100+"%"
}

// ✅ FIXED DROPDOWN
function changeExperiment(value){
currentExperiment=value
resetExperiment()
}

// RESET
function resetExperiment(){
liquidLevelA=0.45
liquidLevelB=0.45
reactionStarted=false
pouredAmount=0
temperature=25
ph=7

clearInterval(interval)

document.getElementById("label").style.display="none"
updateLiquidLevels()
}

</script>
</head>

<body>

<div id="hud" class="panel">
<h3>AR Lab</h3>
<select onchange="changeExperiment(this.value)">
<option value="neutralization">Neutralization</option>
<option value="precipitation">Precipitation</option>
<option value="exothermic">Exothermic</option>
</select>
<button onclick="resetExperiment()">Reset</button>
</div>

<div id="meters" class="panel">
<p>🌡️ <span id="tempText">25°C</span></p>
<div class="bar"><div id="tempFill" class="fill"></div></div>

<p>🧪 <span id="phText">7</span></p>
<div class="bar"><div id="phFill" class="fill"></div></div>
</div>

<div id="label">Reaction</div>

<a-scene embedded arjs="debugUIEnabled:false" pour-system>

<a-marker id="markerA" type="pattern" url="markers/testtube_markerA.patt">
<a-entity id="tubeA">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#fff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidA" radius="0.13" height="0.45" position="0 0.225 0"></a-cylinder>
</a-entity>
</a-marker>

<a-marker id="markerB" type="pattern" url="markers/testtube_markerB.patt">
<a-entity id="tubeB">
<a-cylinder radius="0.15" height="0.6" position="0 0.3 0" color="#fff" opacity="0.5"></a-cylinder>
<a-cylinder id="liquidB" radius="0.13" height="0.45" position="0 0.225 0"></a-cylinder>
</a-entity>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

</body>
</html>
